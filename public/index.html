<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAO Tensor Law Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f1117;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: #161822;
            border-bottom: 1px solid #1e2030;
        }
        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #f1f5f9;
        }
        header h1 span { color: #64748b; font-weight: 400; font-size: 0.875rem; margin-left: 8px; }

        .status-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 16px 32px;
            padding: 12px 24px;
            background: #1a1c2e;
            border-bottom: 1px solid #1e2030;
            font-size: 0.8125rem;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stat-label { color: #64748b; font-weight: 500; }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: #f1f5f9; }

        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 6px currentColor;
        }
        .dot-green { background: #22c55e; color: #22c55e; }
        .dot-yellow { background: #eab308; color: #eab308; }
        .dot-red { background: #ef4444; color: #ef4444; }
        .dot-blue { background: #3b82f6; color: #3b82f6; }

        .zone-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .zone-Bubble { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
        .zone-Expensive { background: rgba(234,179,8,0.15); color: #facc15; border: 1px solid rgba(234,179,8,0.3); }
        .zone-Value { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
        .zone-Discount { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }

        .chart-container {
            flex: 1;
            position: relative;
            padding: 16px;
            min-height: 0;
        }
        #powerLawChart { width: 100% !important; height: 100% !important; }

        .bottom-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px 24px;
            padding: 12px 24px;
            background: #161822;
            border-top: 1px solid #1e2030;
            font-size: 0.8125rem;
        }

        .cards-row {
            display: flex;
            gap: 16px;
            padding: 0 24px 16px;
            flex-wrap: wrap;
        }
        .card {
            flex: 1;
            min-width: 200px;
            background: #161822;
            border: 1px solid #1e2030;
            border-radius: 12px;
            padding: 16px;
        }
        .card h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .card-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.8125rem;
        }
        .card-row .label { color: #94a3b8; }
        .card-row .value { font-family: 'JetBrains Mono', monospace; font-weight: 500; color: #e2e8f0; }

        .band-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .band-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            display: inline-block;
        }

        .loader-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(15,17,23,0.9);
            z-index: 30;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #1e2030;
            border-left-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text {
            margin-top: 12px;
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .refresh-note {
            text-align: center;
            padding: 8px;
            font-size: 0.6875rem;
            color: #475569;
        }

        .offset-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .offset-input {
            width: 70px;
            background: #0f1117;
            border: 1px solid #2d3148;
            border-radius: 6px;
            color: #e2e8f0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8125rem;
            padding: 4px 8px;
            text-align: center;
        }
        .offset-input:focus { outline: none; border-color: #3b82f6; }
        .btn-sm {
            padding: 4px 12px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-sm:hover { background: #2563eb; }

        .toggle-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.8125rem;
            color: #94a3b8;
        }
        .toggle-label input { display: none; }
        .toggle-track {
            width: 36px; height: 20px;
            background: #2d3148;
            border-radius: 10px;
            position: relative;
            transition: background 0.2s;
        }
        .toggle-label input:checked + .toggle-track { background: #3b82f6; }
        .toggle-thumb {
            width: 16px; height: 16px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px; left: 2px;
            transition: transform 0.2s;
        }
        .toggle-label input:checked + .toggle-track .toggle-thumb { transform: translateX(16px); }
    </style>
</head>
<body>
    <header>
        <h1>TAO Tensor Law <span>Bittensor Price Model</span></h1>
        <div class="stat-item">
            <span class="stat-label">Live Price</span>
            <span id="livePrice" class="stat-value" style="font-size:1.125rem;">--</span>
        </div>
    </header>

    <div class="status-bar">
        <div class="stat-item">
            <span id="statusDot" class="dot dot-green"></span>
            <span id="dataStatus" class="stat-label">Loading...</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Last Price</span>
            <span id="lastPrice" class="stat-value">--</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Zone</span>
            <span id="priceZone" class="zone-badge">--</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">R&sup2;</span>
            <span id="r2Value" class="stat-value">--</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Exponent (&alpha;)</span>
            <span id="slopeValue" class="stat-value">--</span>
        </div>
        <div class="stat-item offset-control">
            <span class="stat-label">Day Offset</span>
            <input id="offsetInput" type="number" class="offset-input" value="486">
            <button id="offsetBtn" class="btn-sm" onclick="applyOffset()">Apply</button>
        </div>
    </div>

    <div class="chart-container">
        <div id="loader" class="loader-overlay">
            <div class="spinner"></div>
            <div class="loader-text">Initialising Model</div>
        </div>
        <canvas id="powerLawChart"></canvas>
    </div>

    <div class="bottom-bar">
        <label class="toggle-label">
            Show Bands
            <input type="checkbox" id="showBands" onchange="toggleBands()">
            <div class="toggle-track"><div class="toggle-thumb"></div></div>
        </label>
        <div class="stat-item">
            <span class="stat-label">Data Points</span>
            <span id="dataPoints" class="stat-value">--</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Intercept</span>
            <span id="interceptValue" class="stat-value">--</span>
        </div>
    </div>

    <div class="cards-row">
        <div class="card">
            <h3>Fair Value Projections</h3>
            <div id="projections"></div>
        </div>
        <div class="card">
            <h3>Valuation Bands (Today)</h3>
            <div id="bandLevels"></div>
        </div>
    </div>

    <div class="refresh-note">Auto-refreshes every 5 minutes &middot; Data from taotensorlaw.com &middot; Price from Binance</div>

<script>
// ============================================================
// TAO Tensor Law - Static Dashboard (all logic in browser)
// Ported from app.py Python backend to vanilla JS
// ============================================================

const OFFSET_NAKAMOTO = 486;
let chart = null;
let modelData = null;
let cachedRawData = null;

// ---- Data Fetching ----

async function fetchHistoricalData() {
    const resp = await fetch('https://taotensorlaw.com/price_data.json');
    if (!resp.ok) throw new Error('Failed to fetch price_data.json');
    return await resp.json(); // [[timestamp_s, price], ...]
}

async function fetchBinanceDailyKlines(startMs) {
    try {
        const url = `https://api.binance.com/api/v3/klines?symbol=TAOUSDT&interval=1d&startTime=${Math.floor(startMs)}&limit=1000`;
        const resp = await fetch(url);
        if (!resp.ok) return [];
        const klines = await resp.json();
        return klines.map(k => [k[0] / 1000, parseFloat(k[4])]); // [timestamp_s, close]
    } catch (e) {
        console.error('Binance klines error:', e);
        return [];
    }
}

async function fetchLivePrice() {
    try {
        const resp = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=TAOUSDT');
        const data = await resp.json();
        return parseFloat(data.price);
    } catch (e) {
        return null;
    }
}

async function loadRawData() {
    const raw = await fetchHistoricalData();
    if (!raw || raw.length === 0) throw new Error('No historical data');

    // Fill gap with Binance klines
    const lastTs = raw[raw.length - 1][0];
    const nowTs = Date.now() / 1000;
    const gapDays = (nowTs - lastTs) / 86400;

    if (gapDays > 1) {
        const startMs = (lastTs + 86400) * 1000;
        const klines = await fetchBinanceDailyKlines(startMs);
        for (const k of klines) {
            if (k[0] > lastTs + 43200) { // at least 12h after last point
                raw.push(k);
            }
        }
    }

    cachedRawData = raw;
    return raw;
}

// ---- Power Law Math (ported from app.py) ----

function linearRegressionLog10(data) {
    // data: [{x: day+offset, y: price}, ...]
    const valid = data.filter(p => p.x > 0 && p.y > 0);
    const n = valid.length;
    if (n < 2) return { slope: 0, intercept: 0 };

    let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
    for (const p of valid) {
        const lx = Math.log10(p.x);
        const ly = Math.log10(p.y);
        sumX += lx;
        sumY += ly;
        sumXY += lx * ly;
        sumX2 += lx * lx;
    }

    const denom = n * sumX2 - sumX * sumX;
    if (denom === 0) return { slope: 0, intercept: 0 };

    const slope = (n * sumXY - sumX * sumY) / denom;
    const intercept = (sumY - slope * sumX) / n;
    return { slope, intercept };
}

function calculateR2(data, slope, intercept) {
    const valid = data.filter(p => p.x > 0 && p.y > 0);
    if (valid.length < 2) return 0;

    const yMean = valid.reduce((s, p) => s + Math.log10(p.y), 0) / valid.length;
    let ssTot = 0, ssRes = 0;
    for (const p of valid) {
        const ly = Math.log10(p.y);
        const lx = Math.log10(p.x);
        const predicted = slope * lx + intercept;
        ssTot += (ly - yMean) ** 2;
        ssRes += (ly - predicted) ** 2;
    }

    if (ssTot === 0) return 1;
    return Math.max(0, 1 - ssRes / ssTot);
}

function calculateResiduals(data, slope, intercept) {
    const valid = data.filter(p => p.x > 0 && p.y > 0);
    const residuals = [];
    for (const p of valid) {
        const lx = Math.log10(p.x);
        const ly = Math.log10(p.y);
        const predicted = slope * lx + intercept;
        residuals.push(ly - predicted);
    }
    residuals.sort((a, b) => a - b);
    return residuals;
}

function getPercentile(sortedResiduals, pct) {
    if (!sortedResiduals.length) return 0;
    const idx = (pct / 100) * (sortedResiduals.length - 1);
    const lower = Math.floor(idx);
    const upper = Math.ceil(idx);
    if (lower === upper) return sortedResiduals[lower];
    const weight = idx - lower;
    return sortedResiduals[lower] * (1 - weight) + sortedResiduals[upper] * weight;
}

function computeModel(rawData, dayOffset) {
    if (!rawData || rawData.length < 2) return null;

    // Build base data: dayIndex starts at 1
    const base = [];
    for (let i = 0; i < rawData.length; i++) {
        const ts = rawData[i][0];
        const price = rawData[i][1];
        if (price > 0) {
            base.push({ time: ts * 1000, dayIndex: i + 1, y: price });
        }
    }
    if (base.length < 2) return null;

    // Apply offset
    let priceData = base.map(p => ({ x: p.dayIndex + dayOffset, y: p.y }));
    priceData = priceData.filter(p => p.x > 0);

    const { slope, intercept } = linearRegressionLog10(priceData);
    const r2 = calculateR2(priceData, slope, intercept);
    const residuals = calculateResiduals(priceData, slope, intercept);

    const p1 = getPercentile(residuals, 1);
    const p20 = getPercentile(residuals, 20);
    const p50 = getPercentile(residuals, 50);
    const p80 = getPercentile(residuals, 80);
    const p99 = getPercentile(residuals, 99);

    // Current zone based on last data point
    const last = base[base.length - 1];
    const lastX = last.dayIndex + dayOffset;
    let lastResidual = 0;
    if (lastX > 0) {
        const lastLogX = Math.log10(lastX);
        const lastLogY = Math.log10(last.y);
        const predicted = slope * lastLogX + intercept;
        lastResidual = lastLogY - predicted;
    }

    let zone;
    if (lastResidual > p80) zone = 'Bubble';
    else if (lastResidual > p50) zone = 'Expensive';
    else if (lastResidual > p20) zone = 'Value';
    else zone = 'Discount';

    // "Today" band levels
    const startTs = base[0].time;
    const msPerDay = 86400000;
    const nowMs = Date.now();
    const daysSinceStart = Math.round((nowMs - startTs) / msPerDay);
    const todayIndex = base[0].dayIndex + daysSinceStart;
    const todayLogX = (todayIndex + dayOffset) > 0 ? Math.log10(todayIndex + dayOffset) : 0;

    const medianIntercept = intercept + p50;

    function bandPrice(pctlIntercept) {
        return 10 ** (slope * todayLogX + pctlIntercept);
    }

    const bands = {
        bubble: [bandPrice(intercept + p80), bandPrice(intercept + p99)],
        expensive: [bandPrice(intercept + p50), bandPrice(intercept + p80)],
        value: [bandPrice(intercept + p20), bandPrice(intercept + p50)],
        discount: [bandPrice(intercept + p1), bandPrice(intercept + p20)],
    };

    // Fair value projections
    const firstDate = new Date(base[0].time);
    const firstDayIndex = base[0].dayIndex;
    const currentYear = new Date().getFullYear();

    const targetDates = [
        ['Today', new Date()],
        [String(currentYear + 1), new Date(currentYear + 1, 0, 1)],
        [String(currentYear + 2), new Date(currentYear + 2, 0, 1)],
        [String(currentYear + 3), new Date(currentYear + 3, 0, 1)],
    ];

    const projections = [];
    for (const [label, dt] of targetDates) {
        const diffDays = Math.round((dt - firstDate) / msPerDay);
        const targetDay = firstDayIndex + diffDays;
        const dayForLog = targetDay + dayOffset;
        if (dayForLog > 0) {
            const projPrice = 10 ** (slope * Math.log10(dayForLog) + medianIntercept);
            projections.push({ label, price: Math.round(projPrice * 100) / 100 });
        } else {
            projections.push({ label, price: null });
        }
    }

    // Trend line data for chart (extend 365 days forward)
    const lastDay = base[base.length - 1].dayIndex;
    const futureDay = lastDay + 365;
    const trendLine = [];
    const firstX = base[0].dayIndex + dayOffset;
    const lastXExtended = futureDay + dayOffset;
    if (firstX > 0 && lastXExtended > firstX) {
        const logMin = Math.log10(firstX);
        const logMax = Math.log10(lastXExtended);
        const steps = 200;
        for (let i = 0; i <= steps; i++) {
            const logX = logMin + (logMax - logMin) * i / steps;
            const xVal = 10 ** logX;
            const dayIdx = xVal - dayOffset;
            const tsMs = base[0].time + (dayIdx - base[0].dayIndex) * msPerDay;
            const yMedian = 10 ** (slope * logX + medianIntercept);
            const yP1 = 10 ** (slope * logX + intercept + p1);
            const yP99 = 10 ** (slope * logX + intercept + p99);
            const yP20 = 10 ** (slope * logX + intercept + p20);
            const yP80 = 10 ** (slope * logX + intercept + p80);
            trendLine.push({
                timestamp: tsMs / 1000,
                median: Math.round(yMedian * 10000) / 10000,
                p1: Math.round(yP1 * 10000) / 10000,
                p99: Math.round(yP99 * 10000) / 10000,
                p20: Math.round(yP20 * 10000) / 10000,
                p80: Math.round(yP80 * 10000) / 10000,
            });
        }
    }

    const lastDate = new Date(base[base.length - 1].time);

    return {
        slope: Math.round(slope * 1e6) / 1e6,
        intercept: Math.round(intercept * 1e6) / 1e6,
        median_intercept: Math.round(medianIntercept * 1e6) / 1e6,
        r2: Math.round(r2 * 1e6) / 1e6,
        day_offset: dayOffset,
        zone,
        last_price: base[base.length - 1].y,
        last_date: lastDate.toISOString(),
        data_points: base.length,
        bands,
        projections,
        price_history: base.map(p => [p.time / 1000, p.y]),
        trend_line: trendLine,
    };
}

// ---- UI Updates (identical to original dashboard.html) ----

function updateLivePrice(price) {
    const el = document.getElementById('livePrice');
    if (price) {
        el.textContent = '$' + price.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        el.style.color = '#4ade80';
    }
}

function updateUI(data) {
    if (!data) {
        document.getElementById('dataStatus').textContent = 'Error loading data';
        document.getElementById('statusDot').className = 'dot dot-red';
        document.getElementById('loader').style.display = 'none';
        return;
    }
    modelData = data;

    // Status
    const lastDate = new Date(data.last_date);
    document.getElementById('dataStatus').textContent = lastDate.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    const diffMs = Date.now() - lastDate.getTime();
    if (diffMs < 51 * 3600 * 1000) {
        document.getElementById('statusDot').className = 'dot dot-green';
    } else if (diffMs < 7 * 86400 * 1000) {
        document.getElementById('statusDot').className = 'dot dot-yellow';
    } else {
        document.getElementById('statusDot').className = 'dot dot-red';
    }

    // Prices
    document.getElementById('lastPrice').textContent = '$' + data.last_price.toFixed(2);

    // Zone
    const zoneEl = document.getElementById('priceZone');
    zoneEl.textContent = data.zone;
    zoneEl.className = 'zone-badge zone-' + data.zone;

    // Model params
    document.getElementById('r2Value').textContent = data.r2.toFixed(4);
    document.getElementById('slopeValue').textContent = data.slope.toFixed(4);
    document.getElementById('interceptValue').textContent = data.intercept.toFixed(4);
    document.getElementById('dataPoints').textContent = data.data_points;
    document.getElementById('offsetInput').value = data.day_offset;

    // Projections
    const projEl = document.getElementById('projections');
    projEl.innerHTML = data.projections.map(p =>
        `<div class="card-row"><span class="label">${p.label}</span><span class="value">$${p.price ? p.price.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : 'N/A'}</span></div>`
    ).join('');

    // Bands
    const bands = data.bands;
    const bandEl = document.getElementById('bandLevels');
    const bandItems = [
        { name: 'Bubble', color: '#f87171', range: bands.bubble },
        { name: 'Expensive', color: '#facc15', range: bands.expensive },
        { name: 'Value', color: '#4ade80', range: bands.value },
        { name: 'Discount', color: '#60a5fa', range: bands.discount },
    ];
    bandEl.innerHTML = bandItems.map(b =>
        `<div class="card-row">
            <span class="label band-label"><span class="band-dot" style="background:${b.color}"></span>${b.name}</span>
            <span class="value">$${b.range[0].toFixed(2)} – $${b.range[1].toFixed(2)}</span>
        </div>`
    ).join('');

    buildChart(data);
    document.getElementById('loader').style.display = 'none';
}

function buildChart(data) {
    const ctx = document.getElementById('powerLawChart').getContext('2d');

    const pricePoints = data.price_history.map(p => ({ x: p[0] * 1000, y: p[1] }));

    const medianLine = data.trend_line.map(p => ({ x: p.timestamp * 1000, y: p.median }));
    const p1Line = data.trend_line.map(p => ({ x: p.timestamp * 1000, y: p.p1 }));
    const p99Line = data.trend_line.map(p => ({ x: p.timestamp * 1000, y: p.p99 }));
    const p20Line = data.trend_line.map(p => ({ x: p.timestamp * 1000, y: p.p20 }));
    const p80Line = data.trend_line.map(p => ({ x: p.timestamp * 1000, y: p.p80 }));

    const showBands = document.getElementById('showBands').checked;

    const datasets = [
        { label: '_p1_boundary', data: p1Line, borderColor: 'transparent', backgroundColor: 'transparent', fill: false, pointRadius: 0, borderWidth: 0, hidden: !showBands },
        { label: '_discount_fill', data: p20Line, borderColor: 'transparent', backgroundColor: 'rgba(96,165,250,0.12)', fill: 0, pointRadius: 0, borderWidth: 0, hidden: !showBands },
        { label: '_value_fill', data: medianLine, borderColor: 'transparent', backgroundColor: 'rgba(74,222,128,0.12)', fill: 1, pointRadius: 0, borderWidth: 0, hidden: !showBands },
        { label: '_expensive_fill', data: p80Line, borderColor: 'transparent', backgroundColor: 'rgba(250,204,21,0.12)', fill: 2, pointRadius: 0, borderWidth: 0, hidden: !showBands },
        { label: '_bubble_fill', data: p99Line, borderColor: 'transparent', backgroundColor: 'rgba(248,113,113,0.12)', fill: 3, pointRadius: 0, borderWidth: 0, hidden: !showBands },

        {
            label: 'Price',
            data: pricePoints,
            borderColor: '#e2e8f0',
            backgroundColor: 'rgba(226,232,240,0.05)',
            borderWidth: 1.5,
            pointRadius: 0,
            pointHoverRadius: 4,
            pointHitRadius: 10,
            tension: 0.1,
            fill: false,
        },
        {
            label: '50th Pctl (Fair Value)',
            data: medianLine,
            borderColor: '#f97316',
            borderWidth: 2,
            pointRadius: 0,
            fill: false,
            borderDash: [],
        },
        {
            label: '1st Pctl',
            data: p1Line,
            borderColor: 'rgba(148,163,184,0.7)',
            borderWidth: 1,
            pointRadius: 0,
            fill: false,
            borderDash: [4, 4],
        },
        {
            label: '99th Pctl',
            data: p99Line,
            borderColor: 'rgba(148,163,184,0.7)',
            borderWidth: 1,
            pointRadius: 0,
            fill: false,
            borderDash: [4, 4],
        },
        {
            label: '20th Pctl',
            data: p20Line,
            borderColor: 'rgba(148,163,184,0.5)',
            borderWidth: 1,
            pointRadius: 0,
            fill: false,
            borderDash: [4, 4],
            hidden: !showBands,
        },
        {
            label: '80th Pctl',
            data: p80Line,
            borderColor: 'rgba(148,163,184,0.5)',
            borderWidth: 1,
            pointRadius: 0,
            fill: false,
            borderDash: [4, 4],
            hidden: !showBands,
        },
    ];

    const config = {
        type: 'line',
        data: { datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: {
                    labels: {
                        color: '#94a3b8',
                        usePointStyle: true,
                        boxWidth: 20,
                        font: { family: "'Inter', sans-serif", size: 11 },
                        filter: (item) => !item.text.startsWith('_'),
                    }
                },
                tooltip: {
                    backgroundColor: 'rgba(15,23,42,0.95)',
                    titleColor: '#f8fafc',
                    bodyColor: '#f8fafc',
                    titleFont: { family: "'Inter', sans-serif", weight: 600 },
                    bodyFont: { family: "'JetBrains Mono', monospace" },
                    borderColor: 'rgba(255,255,255,0.1)',
                    borderWidth: 1,
                    padding: 10,
                    displayColors: false,
                    filter: (item) => {
                        if (item.dataset.label.startsWith('_')) return false;
                        // For the Price dataset, only show tooltip if we're near actual price data
                        // (prevent snapping to old price points when hovering over future area)
                        if (item.dataset.label === 'Price') {
                            const chart = item.chart;
                            const xMs = item.parsed.x;
                            const priceData = item.dataset.data;
                            if (priceData && priceData.length > 0) {
                                const lastPriceTs = priceData[priceData.length - 1].x;
                                // Only show price tooltip if within 30 days of last price point
                                if (xMs > lastPriceTs + 30 * 86400000) return false;
                            }
                        }
                        return true;
                    },
                    callbacks: {
                        title: (items) => {
                            if (items.length > 0) {
                                // Prefer the x value from a trend/projection dataset if available
                                // (more accurate for future dates)
                                const trendItem = items.find(i => i.dataset.label !== 'Price');
                                const xMs = trendItem ? trendItem.parsed.x : items[0].parsed.x;
                                const d = new Date(xMs);
                                return d.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
                            }
                            return '';
                        },
                        label: (ctx) => {
                            if (ctx.dataset.label.startsWith('_')) return null;
                            return ctx.dataset.label + ': $' + ctx.parsed.y.toFixed(2);
                        }
                    }
                }
            },
            scales: {
                x: {
                    type: 'time',
                    time: { unit: 'year', displayFormats: { year: 'yyyy' } },
                    ticks: { color: '#64748b', font: { family: "'Inter', sans-serif", size: 10 } },
                    grid: { color: 'rgba(255,255,255,0.04)' },
                    title: { display: true, text: 'Time', color: '#64748b', font: { size: 11, family: 'Inter' } },
                },
                y: {
                    type: 'logarithmic',
                    ticks: {
                        color: '#64748b',
                        font: { family: "'Inter', sans-serif", size: 10 },
                        callback: function (value) {
                            const logVal = Math.log10(value);
                            if (Math.abs(logVal - Math.round(logVal)) < 1e-9) {
                                return '$' + value.toLocaleString();
                            }
                            return '';
                        }
                    },
                    grid: {
                        color: function (ctx) {
                            const val = ctx.tick.value;
                            if (val <= 0) return 'rgba(255,255,255,0.04)';
                            const logVal = Math.log10(val);
                            if (Math.abs(logVal - Math.round(logVal)) < 1e-9) return 'rgba(255,255,255,0.08)';
                            return 'rgba(255,255,255,0.02)';
                        }
                    },
                    title: { display: true, text: 'Price (Log Scale)', color: '#64748b', font: { size: 11, family: 'Inter' } },
                }
            }
        }
    };

    if (chart) {
        chart.destroy();
    }
    chart = new Chart(ctx, config);
}

function toggleBands() {
    if (!chart || !modelData) return;
    const show = document.getElementById('showBands').checked;
    for (let i = 0; i <= 4; i++) {
        chart.setDatasetVisibility(i, show);
    }
    chart.setDatasetVisibility(9, show);
    chart.setDatasetVisibility(10, show);
    chart.update();
}

function applyOffset() {
    const offset = parseInt(document.getElementById('offsetInput').value);
    if (isNaN(offset) || !cachedRawData) return;
    document.getElementById('loader').style.display = 'flex';
    try {
        const model = computeModel(cachedRawData, offset);
        updateUI(model);
    } catch (e) {
        console.error('Offset recompute error:', e);
        document.getElementById('loader').style.display = 'none';
    }
}

// ---- Initialization ----

async function init() {
    try {
        const raw = await loadRawData();
        const offset = parseInt(document.getElementById('offsetInput').value) || OFFSET_NAKAMOTO;
        const model = computeModel(raw, offset);

        // Fetch live price in parallel
        const livePrice = await fetchLivePrice();
        if (livePrice) updateLivePrice(livePrice);

        updateUI(model);
    } catch (e) {
        console.error('Init error:', e);
        document.getElementById('dataStatus').textContent = 'Error loading data';
        document.getElementById('statusDot').className = 'dot dot-red';
        document.getElementById('loader').style.display = 'none';
    }

    // Update live price every 30 seconds
    setInterval(async () => {
        const p = await fetchLivePrice();
        if (p) updateLivePrice(p);
    }, 30000);

    // Full refresh every 5 minutes
    setInterval(async () => {
        try {
            const raw = await loadRawData();
            const offset = parseInt(document.getElementById('offsetInput').value) || OFFSET_NAKAMOTO;
            const model = computeModel(raw, offset);
            const livePrice = await fetchLivePrice();
            if (livePrice) updateLivePrice(livePrice);
            updateUI(model);
        } catch (e) {
            console.error('Refresh error:', e);
        }
    }, 300000);
}

init();
</script>
</body>
</html>
